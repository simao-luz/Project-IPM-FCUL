<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Smartwatch Main</title>
    <link rel="stylesheet" href="smartwatch-main.css"/>
</head>
<body>
<div class="watch-frame">
    <header class="main-header"> tribe </header>
    <div class="main-container">
        <button class="option-button animals-btn">🐾 Os meus animais</button>
        <button class="option-button emergency-btn">⚠️ Emergência</button>
    </div>
    <div class="popup-overlay" id="emergencyPopup">
        <div class="popup-box">
            <p> Quer efetuar uma chamada de emergência? </p>
            <div class="popup-buttons">
                <button class="popup-btn yes-btn"> ✅ Sim </button>
                <button class="popup-btn no-btn"> ❌ Não </button>
            </div>
        </div>
    </div>
</div>

<script src="smartwatch-main.js"> </script>
</body>
</html>
